</g>
<g class="c-gray">
  <rect x="182" y="886" width="110" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="237" y="904" text-anchor="middle" dominant-baseline="central">PRD generator</text>
</g>
<g class="c-gray">
  <rect x="304" y="886" width="110" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="359" y="904" text-anchor="middle" dominant-baseline="central">SWOT analysis</text>
</g>
<g class="c-gray">
  <rect x="426" y="886" width="110" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="481" y="904" text-anchor="middle" dominant-baseline="central">Web scraper</text>
</g>
<g class="c-gray">
  <rect x="548" y="886" width="76" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="586" y="904" text-anchor="middle" dominant-baseline="central">5,700+</text>
</g>

<g class="c-teal">
  <rect x="220" y="966" width="240" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="986" text-anchor="middle" dominant-baseline="central">ClawHub marketplace</text>
</g>
<line x1="340" y1="946" x2="340" y2="964" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="1030" text-anchor="middle" fill="var(--color-text-secondary)">Atlas can write its own skills. Tools that build tools.</text>

<path d="M560 886 L620 860 L620 545" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3" opacity="0.4"/>
<text class="ts" x="632" y="720" transform="rotate(90 632 720)" text-anchor="middle" fill="var(--color-text-tertiary)">MCP</text>

</svg>
